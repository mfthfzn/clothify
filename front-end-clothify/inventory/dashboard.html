<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Clothify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body data-page="dashboard" class="app-shell">
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand-badge"><i class="fa-solid fa-shirt"></i></div>
        <div>
          <div class="fw-bold">Clothify</div>
          <small class="text-muted">Admin Dashboard</small>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-link active" href="dashboard.html"><i class="fa-solid fa-chart-line"></i><span>Dashboard</span></a>
        <a class="nav-link" href="products.html"><i class="fa-solid fa-box-open"></i><span>Produk</span></a>
        <a class="nav-link" href="categories.html"><i class="fa-solid fa-layer-group"></i><span>Kategori</span></a>
        <a class="nav-link text-danger" href="../index.html"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a>
      </nav>
    </aside>

    <div class="content-area">
      <header class="topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="btn btn-light btn-icon" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
          <div>
            <div class="text-muted small">Selamat datang kembali</div>
            <h1 class="h4 mb-0 fw-bold">Dashboard Admin</h1>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-light btn-icon" id="darkModeToggle" title="Dark mode"><i class="fa-solid fa-moon"></i></button>
          <div class="user-chip">
            <div class="avatar">A</div>
            <div>
              <div class="fw-semibold">Admin</div>
              <small class="text-muted">admin</small>
            </div>
          </div>
        </div>
      </header>

      <main class="container-fluid py-4">
        <div class="row g-4 mb-4">
          <div class="col-12 col-sm-6 col-xl-3"><div class="stat-card"><div><p class="text-muted mb-1">Total Produk</p><h3 class="mb-0">248</h3></div><div class="stat-icon text-primary"><i class="fa-solid fa-boxes-stacked"></i></div></div></div>
          <div class="col-12 col-sm-6 col-xl-3"><div class="stat-card"><div><p class="text-muted mb-1">Total Stok</p><h3 class="mb-0">1.940</h3></div><div class="stat-icon text-success"><i class="fa-solid fa-warehouse"></i></div></div></div>
          <div class="col-12 col-sm-6 col-xl-3"><div class="stat-card"><div><p class="text-muted mb-1">Total Transaksi</p><h3 class="mb-0">1.258</h3></div><div class="stat-icon text-warning"><i class="fa-solid fa-receipt"></i></div></div></div>
          <div class="col-12 col-sm-6 col-xl-3"><div class="stat-card"><div><p class="text-muted mb-1">Pendapatan Hari Ini</p><h3 class="mb-0">Rp 12,8 jt</h3></div><div class="stat-icon text-danger"><i class="fa-solid fa-sack-dollar"></i></div></div></div>
        </div>

        <div class="row g-4">
          <div class="col-12 col-xl-8">
            <div class="panel-card">
              <div class="panel-head"><h5 class="mb-0 fw-bold">Grafik Penjualan</h5><span class="text-muted small">7 hari terakhir</span></div>
              <div class="chart-wrap"><canvas id="salesChart"></canvas></div>
            </div>
          </div>
          <div class="col-12 col-xl-4">
            <div class="panel-card h-100">
              <div class="panel-head"><h5 class="mb-0 fw-bold">Aktivitas Cepat</h5></div>
              <div class="quick-list">
                <button type="button" class="quick-item" data-quick-action="products"><i class="fa-solid fa-plus"></i><div><div class="fw-semibold">Tambah Produk</div><small class="text-muted">Buat data produk baru</small></div></button>
                <button type="button" class="quick-item" data-quick-action="categories"><i class="fa-solid fa-tags"></i><div><div class="fw-semibold">Atur Kategori</div><small class="text-muted">Kelola klasifikasi barang</small></div></button>
                <button type="button" class="quick-item" data-quick-action="report"><i class="fa-solid fa-file-export"></i><div><div class="fw-semibold">Unduh Laporan</div><small class="text-muted">Ekspor data transaksi</small></div></button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../config/constants.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/modules/admin.js"></script>
</body>
</html>
