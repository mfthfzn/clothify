<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produk - Clothify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body data-page="products" class="app-shell">
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand-badge"><i class="fa-solid fa-shirt"></i></div>
        <div>
          <div class="fw-bold">Clothify</div>
          <small class="text-muted">Admin Dashboard</small>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-link" href="dashboard.html"><i class="fa-solid fa-chart-line"></i><span>Dashboard</span></a>
        <a class="nav-link active" href="products.html"><i class="fa-solid fa-box-open"></i><span>Produk</span></a>
        <a class="nav-link" href="categories.html"><i class="fa-solid fa-layer-group"></i><span>Kategori</span></a>
        <a class="nav-link text-danger" href="../index.html"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a>
      </nav>
    </aside>

    <div class="content-area">
      <header class="topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="btn btn-light btn-icon" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
          <div>
            <div class="text-muted small">Kelola inventori</div>
            <h1 class="h4 mb-0 fw-bold">Manajemen Produk</h1>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-light btn-icon" id="darkModeToggle"><i class="fa-solid fa-moon"></i></button>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal"><i class="fa-solid fa-plus me-2"></i>Tambah Produk</button>
        </div>
      </header>

      <main class="container-fluid py-4">
        <div class="panel-card mb-4">
          <div class="row g-3 align-items-center">
            <div class="col-12 col-lg-5"><div class="input-group input-group-lg"><span class="input-group-text bg-white"><i class="fa-solid fa-magnifying-glass"></i></span><input type="text" id="productSearch" class="form-control" placeholder="Cari produk..." /></div></div>
            <div class="col-12 col-lg-4"><select id="categoryFilter" class="form-select form-select-lg"><option value="all">Semua kategori</option><option value="Pakaian Atas">Pakaian Atas</option><option value="Pakaian Bawah">Pakaian Bawah</option></select></div>
            <div class="col-12 col-lg-3 text-lg-end"><small class="text-muted">Realtime search, filter, pagination, modal CRUD</small></div>
          </div>
        </div>

        <div class="panel-card table-responsive">
          <table class="table align-middle mb-0" id="productTable">
            <thead>
              <tr><th>Foto</th><th>Nama Produk</th><th>Kategori</th><th>Ukuran</th><th>Warna</th><th>Harga</th><th>Stok</th><th>Aksi</th></tr>
            </thead>
            <tbody></tbody>
          </table>
          <div class="p-3 d-flex justify-content-between align-items-center flex-wrap gap-3">
            <small class="text-muted" id="productTableInfo"></small>
            <nav><ul class="pagination pagination-sm mb-0" id="productPagination"></ul></nav>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content modal-soft">
        <div class="modal-header border-0"><h5 class="modal-title fw-bold" id="productModalTitle">Tambah Produk</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <form id="productForm" class="row g-3" novalidate>
            <input type="hidden" id="productId" />
            <div class="col-md-6"><label class="form-label">Nama Produk</label><input type="text" id="productName" class="form-control" /></div>
            <div class="col-md-6"><label class="form-label">Kategori</label><select id="productCategory" class="form-select"><option value="">Pilih kategori</option><option>Pakaian Atas</option><option>Pakaian Bawah</option></select></div>
            <div class="col-md-4"><label class="form-label">Ukuran</label><input type="text" id="productSize" class="form-control" placeholder="M, L, XL" /></div>
            <div class="col-md-4"><label class="form-label">Warna</label><input type="text" id="productColor" class="form-control" /></div>
            <div class="col-md-4"><label class="form-label">Harga</label><input type="number" id="productPrice" class="form-control" /></div>
            <div class="col-md-4"><label class="form-label">Stok</label><input type="number" id="productStock" class="form-control" /></div>
            <div class="col-md-8"><label class="form-label">Upload Gambar</label><input type="file" id="productImage" class="form-control" accept="image/*" /></div>
            <div class="col-12"><label class="form-label">Deskripsi</label><textarea id="productDescription" class="form-control" rows="3"></textarea></div>
            <div class="col-12 d-flex align-items-center gap-3">
              <div class="preview-box"><img id="imagePreview" alt="Preview produk" /></div>
              <div class="text-muted small">Preview image akan tampil sebelum disimpan. Form divalidasi dengan JavaScript.</div>
            </div>
          </form>
        </div>
        <div class="modal-footer border-0"><button type="button" class="btn btn-light" data-bs-dismiss="modal">Batal</button><button type="button" class="btn btn-primary" id="saveProductBtn">Simpan Produk</button></div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../config/constants.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/modules/admin.js"></script>
</body>
</html>
