<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clothify - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="login-page bg-auth">
  <main class="auth-wrapper">
    <section class="auth-card glass-card shadow-xl">
      <div class="auth-brand mb-4">
        <div class="brand-badge"><i class="fa-solid fa-shirt"></i></div>
        <div>
          <p class="eyebrow mb-1">Inventory & POS</p>
          <h1 class="h4 fw-bold mb-0">Clothify</h1>
        </div>
      </div>

      <div class="mb-4">
        <h2 class="h5 fw-semibold mb-2">Login Akun</h2>
        <p class="text-muted mb-0">Role akan ditentukan otomatis berdasarkan akun login Anda.</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" class="form-control form-control-lg" id="username" placeholder="admin" autocomplete="username" />
          <div class="invalid-feedback" id="usernameError">Masukkan username yang valid.</div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <div class="input-group input-group-lg password-group">
            <input type="password" class="form-control" id="password" placeholder="••••••••" />
            <button class="btn btn-outline-secondary" type="button" id="togglePassword" aria-label="Tampilkan password">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
          <div class="invalid-feedback d-block" id="passwordError"></div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe" checked>
            <label class="form-check-label" for="rememberMe">Ingat saya</label>
          </div>
          <a href="#" class="small text-decoration-none text-primary">Lupa password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold">
          <i class="fa-solid fa-right-to-bracket me-2"></i>Login
        </button>
      </form>

      <div class="auth-note mt-4 text-center text-muted small">
        Demo admin: <strong>admin</strong> / <strong>admin123</strong><br>
        Demo kasir: <strong>kasir</strong> / <strong>kasir123</strong>
      </div>
    </section>
  </main>

  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="config/constants.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
