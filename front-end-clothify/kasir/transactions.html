<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transaksi - Clothify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body data-page="transactions" class="app-shell">
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top"><div class="brand-badge"><i class="fa-solid fa-shirt"></i></div><div><div class="fw-bold">Clothify</div><small class="text-muted">Cashier Dashboard</small></div></div>
      <nav class="sidebar-nav">
        <a class="nav-link active" href="transactions.html"><i class="fa-solid fa-receipt"></i><span>Transaksi</span></a>
        <a class="nav-link" href="transaction-history.html"><i class="fa-solid fa-history"></i><span>Riwayat Transaksi</span></a>
        <a class="nav-link text-danger" href="../index.html"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a>
      </nav>
    </aside>
    <div class="content-area">
      <header class="topbar">
        <div class="d-flex align-items-center gap-3"><button class="btn btn-light btn-icon" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button><div><div class="text-muted small">Kasir & checkout</div><h1 class="h4 mb-0 fw-bold">Transaksi / Kasir</h1></div></div>
        <div class="d-flex align-items-center gap-2"><button class="btn btn-light btn-icon" id="darkModeToggle"><i class="fa-solid fa-moon"></i></button></div>
      </header>
      <main class="container-fluid py-4">
        <div class="row g-4">
          <div class="col-12 col-xl-7">
            <div class="panel-card h-100">
              <div class="panel-head"><h5 class="mb-0 fw-bold">Produk</h5><small class="text-muted">Cari dan tambahkan ke keranjang</small></div>
              <div class="input-group input-group-lg mb-3"><span class="input-group-text bg-white"><i class="fa-solid fa-magnifying-glass"></i></span><input type="text" id="cashierSearch" class="form-control" placeholder="Search produk..."></div>
              <div class="product-grid" id="cashierProductList"></div>
            </div>
          </div>
          <div class="col-12 col-xl-5">
            <div class="panel-card h-100">
              <div class="panel-head"><h5 class="mb-0 fw-bold">Keranjang</h5><small class="text-muted">Subtotal dan total otomatis</small></div>
              <div class="cart-list" id="cartList"></div>
              <div class="cart-summary mt-3">
                <div class="d-flex justify-content-between"><span>Subtotal</span><strong id="subtotalAmount">Rp 0</strong></div>
                <div class="d-flex justify-content-between"><span>Diskon</span><strong>Rp 0</strong></div>
                <hr>
                <div class="d-flex justify-content-between fs-5"><span>Total</span><strong id="totalAmount">Rp 0</strong></div>
                <button class="btn btn-primary btn-lg w-100 mt-3" id="checkoutBtn"><i class="fa-solid fa-cash-register me-2"></i>Checkout</button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../config/constants.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/modules/kasir.js"></script>
</body>
</html>
