<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riwayat Transaksi - Clothify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body data-page="transaction-history" class="app-shell">
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top"><div class="brand-badge"><i class="fa-solid fa-shirt"></i></div><div><div class="fw-bold">Clothify</div><small class="text-muted">Cashier Dashboard</small></div></div>
      <nav class="sidebar-nav">
        <a class="nav-link" href="transactions.html"><i class="fa-solid fa-receipt"></i><span>Transaksi</span></a>
        <a class="nav-link active" href="transaction-history.html"><i class="fa-solid fa-history"></i><span>Riwayat Transaksi</span></a>
        <a class="nav-link text-danger" href="../index.html"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a>
      </nav>
    </aside>
    <div class="content-area">
      <header class="topbar">
        <div class="d-flex align-items-center gap-3"><button class="btn btn-light btn-icon" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button><div><div class="text-muted small">Lihat semua transaksi Anda</div><h1 class="h4 mb-0 fw-bold">Riwayat Transaksi</h1></div></div>
        <div class="d-flex align-items-center gap-2"><button class="btn btn-light btn-icon" id="darkModeToggle"><i class="fa-solid fa-moon"></i></button></div>
      </header>
      <main class="container-fluid py-4">
        <div class="panel-card mb-4"><div class="input-group input-group-lg"><span class="input-group-text bg-white"><i class="fa-solid fa-magnifying-glass"></i></span><input type="text" class="form-control" id="transactionSearch" placeholder="Cari transaksi..."></div></div>
        <div class="panel-card table-responsive">
          <table class="table align-middle mb-0" id="transactionTable"><thead><tr><th>No. Transaksi</th><th>Tanggal</th><th>Total</th><th>Status</th><th>Aksi</th></tr></thead><tbody></tbody></table>
        </div>
      </main>
    </div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../config/constants.js"></script>
  <script src="../js/utils/helpers.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/modules/kasir.js"></script>
</body>
</html>
